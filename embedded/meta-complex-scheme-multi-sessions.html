<!doctype html>

    <style>
      :root {

        --embed-bg: #f6f7f9;

        --embed-text: #f4f7f5;
        --embed-muted: #a4afaa;
      }

      * {

      }

      body {
        min-height: 100vh;
        margin: 0;
        background: var(--embed-bg);
        color: var(--embed-text);
      }

      .embed-shell {
        width: min(860px, calc(100% - 32px));
        margin: 0 auto;
        padding: 24px 0 40px;
      }

      .embed-header {

      }

      .embed-title {

      .embed-subtitle {

        font-size: 13px;
        overflow-wrap: anywhere;
      }

  <body>

    <script>

      }
      if (inlineCode !== '') {

        script.src = useNewWidget
          ? 'https://w.stage.freetc.net/w/injector.js'
          : 'https://stage.freetc.net/static/scripts/widget/tcwidget.js';
