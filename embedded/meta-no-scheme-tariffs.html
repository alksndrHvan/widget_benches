<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Мета / Без схемы / Тарифы</title>
    <script>
      window.ticketscloud_url = 'https://stage.freetc.net';
      window.widgetBenchTheme = new URLSearchParams(window.location.search).get('theme');
      if (window.widgetBenchTheme === 'dark') {
        document.documentElement.dataset.theme = 'dark';
      }
    </script>
    <style>
      :root {
        color-scheme: light;
        --embed-bg: #f6f7f9;
        --embed-text: #17202a;
        --embed-muted: #667085;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      :root[data-theme='dark'] {
        color-scheme: dark;
        --embed-bg: #101312;
        --embed-text: #f4f7f5;
        --embed-muted: #a4afaa;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background: var(--embed-bg);
        color: var(--embed-text);
      }

      .embed-shell {
        width: min(860px, calc(100% - 32px));
        margin: 0 auto;
        padding: 24px 0 40px;
      }

      .embed-header {
        margin-bottom: 16px;
      }

      .embed-title {
        margin: 0;
        font-size: 22px;
        line-height: 1.25;
        font-weight: 700;
        letter-spacing: 0;
      }

      .embed-subtitle {
        margin-top: 6px;
        color: var(--embed-muted);
        font-size: 13px;
        overflow-wrap: anywhere;
      }

      .embed-widget {
        width: 100%;
      }
    </style>
  </head>
  <body>
    <main class="embed-shell">
      <header class="embed-header">
        <h1 class="embed-title">Мета / Без схемы / Тарифы</h1>
        <div class="embed-subtitle">Виджет. meta_no_scheme_tariffs 1779114512855</div>
      </header>
      <section class="embed-widget">
        <div data-tc-event-inline="6a0b2211bf1e77aed42d3037" data-tc-token="eyJhbGciOiJIUzI1NiIsImlzcyI6InN0YWdlLmZyZWV0Yy5uZXQiLCJ0eXAiOiJKV1QifQ.eyJwIjoiNmEwYWIyNjU0NjY4YTlmNDA5ZmMwY2Y4In0.BB1_cScUutGlNz04M8XlUWT9ZqISF3cBIDDX5z3GsRs" data-tc-lang="ru" data-tc-meta="true"></div>
      </section>
    </main>
    <script>
      if (window.widgetBenchTheme === 'dark') {
        const widgetElements = document.querySelectorAll('[data-tc-event-inline], [tc-event-inline]');
        widgetElements.forEach((element) => element.setAttribute('data-tc-theme', 'dark'));
      }
    </script>
    <script src="https://stage.freetc.net/static/scripts/widget/tcwidget.js"></script>
  </body>
</html>
